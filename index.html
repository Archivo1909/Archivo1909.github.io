<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Círculo en Plano Cartesiano</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        /* ══════════════════════════════════════════════
           TEMA OSCURO
        ══════════════════════════════════════════════ */
        :root, [data-theme="dark"] {
            --bg: #111110;
            --surface: #1c1c1a;
            --surface2: #242422;
            --surface3: #2c2c28;
            --border: #2e2e2a;
            --border2: #3a3a34;
            --text: #e8e8e0;
            --text-muted: #8a8a78;
            --text-faint: #505048;
            --accent: #c9a876;
            --accent-light: #2a251c;
            --accent-mid: #4a4130;
            --point: #6e6e62;
            --canvas-grid: #202020;
            --canvas-axis: #3a3a30;
            --canvas-axis-label: #505048;
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            font-size: 13px;
            line-height: 1.6;
            transition: background 0.25s, color 0.25s;
        }

        /* ── HEADER ── */
        header {
            border-bottom: 1px solid var(--border);
            padding: 18px 20px 14px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 14px;
            background: var(--surface);
        }

        header h1 {
            font-family: 'Fraunces', serif;
            font-weight: 300;
            font-size: 18px;
            letter-spacing: -0.4px;
        }

        /* ── MAIN LAYOUT ── */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            gap: 0;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0;
            min-height: 0;
        }

        /* ── PANEL LEFT (TABLA) ── */
        .panel-left {
            flex: 0 0 auto;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            max-height: 35vh;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .panel-left::-webkit-scrollbar {
            width: 4px;
        }

        .panel-left::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 2px;
        }

        /* ── TABLE HEAD ── */
        .tbl-head {
            padding: 12px 18px 10px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .tbl-head h2 {
            font-family: 'Fraunces', serif;
            font-weight: 300;
            font-size: 14px;
            color: var(--text);
        }

        /* ── TABLE ── */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        thead {
            background: var(--surface2);
            position: sticky;
            top: 50px;
            z-index: 9;
        }

        th {
            padding: 8px 10px;
            text-align: center;
            font-weight: 500;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 9px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        td {
            padding: 8px 10px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-size: 11px;
        }

        tbody tr {
            transition: background 0.15s;
            cursor: pointer;
        }

        tbody tr:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        tbody tr.activo {
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 500;
        }

        /* ── CANVAS AREA ── */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg);
            min-height: 0;
            position: relative;
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: 100%;
            max-width: 500px;
            max-height: 500px;
            border: 2px solid var(--border);
            border-radius: 4px;
            background: var(--surface);
            user-select: none;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3);
        }

        .punto {
            cursor: pointer;
            transition: r 0.2s, fill 0.2s;
        }

        .punto:hover {
            r: 2.2;
            fill: var(--accent);
            filter: drop-shadow(0 0 3px rgba(201, 168, 118, 0.5));
        }

        .punto.activo {
            r: 2.5;
            fill: var(--accent);
            filter: drop-shadow(0 0 6px rgba(201, 168, 118, 0.85));
        }

        .punto-label {
            pointer-events: none;
            fill: var(--accent);
            font-weight: bold;
            font-family: 'DM Mono', monospace;
        }

        .punto-label-bg {
            fill: var(--surface);
            rx: 1;
            ry: 1;
        }

        .eje {
            stroke: var(--canvas-axis);
            stroke-width: 1.5;
        }

        .cuadricula {
            stroke: var(--canvas-grid);
            stroke-width: 0.5;
        }

        .etiqueta-eje {
            fill: var(--canvas-axis-label);
            text-anchor: middle;
            font-family: 'DM Mono', monospace;
        }

        /* ── FOOTER ── */
        footer {
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            background: var(--surface);
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        footer span {
            display: inline;
        }

        /* ── RESPONSIVE (MOBILE-FIRST) ── */
        @media (min-width: 1024px) {
            main {
                flex-direction: row;
                gap: 0;
            }

            .panel-left {
                flex: 0 0 280px;
                max-height: none;
                border-right: 1px solid var(--border);
                border-bottom: none;
            }

            .main-content {
                flex: 1;
            }

            .canvas-area {
                flex: 1;
                padding: 20px;
            }

            header h1 {
                font-size: 20px;
            }
        }

        @media (max-width: 1023px) {
            header {
                padding: 14px 16px 10px;
            }

            header h1 {
                font-size: 16px;
            }

            .canvas-area {
                padding: 15px;
            }

            footer {
                gap: 12px;
                font-size: 10px;
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Círculo en Plano Cartesiano</h1>
    </header>

    <main>
        <!-- TABLA IZQUIERDA -->
        <div class="panel-left">
            <div class="tbl-head">
                <h2>Coordenadas</h2>
            </div>
            <table id="tabla">
                <thead>
                    <tr>
                        <th>Punto</th>
                        <th>X (cm)</th>
                        <th>Y (cm)</th>
                        <th>Ángulo</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                </tbody>
            </table>
        </div>

        <!-- CANVAS Y CONTENIDO -->
        <div class="main-content">
            <!-- CANVAS -->
            <div class="canvas-area">
                <svg id="grafico" viewBox="-30 -30 60 60" preserveAspectRatio="xMidYMid meet">
                    <!-- Cuadrícula -->
                    <g class="cuadricula" id="cuadricula"></g>

                    <!-- Ejes -->
                    <line class="eje" x1="-25" y1="0" x2="25" y2="0" />
                    <line class="eje" x1="0" y1="-25" x2="0" y2="25" />

                    <!-- Flechas de ejes -->
                    <polygon points="25,0 23,-1 23,1" fill="var(--canvas-axis)" />
                    <polygon points="0,-25 -1,-23 1,-23" fill="var(--canvas-axis)" />

                    <!-- Círculo (referencia visual) -->
                    <circle cx="0" cy="0" r="20" fill="none" stroke="var(--border)" stroke-width="0.8" stroke-dasharray="2,2" />

                    <!-- Puntos -->
                    <g id="puntos"></g>
                </svg>
            </div>
        </div>
    </main>

    <footer>
        <span>David Hernández Gutiérrez</span>
        <span>Ulises Ortiz Vázquez</span>
        <span>Temas Selectos de Matemáticas</span>
    </footer>

    <script>
        // Generar datos de los 150 puntos
        const radio = 20;
        const numPuntos = 150;
        const anguloPorParte = 360 / numPuntos;

        const puntos = [];
        for (let i = 0; i < numPuntos; i++) {
            const anguloRad = ((-i * anguloPorParte) * Math.PI) / 180;
            const x = radio * Math.cos(anguloRad);
            const y = radio * Math.sin(anguloRad);
            const anguloNorm = ((-i * anguloPorParte) + 360) % 360;
            puntos.push({
                numero: i,
                x: parseFloat(x.toFixed(4)),
                y: parseFloat(y.toFixed(4)),
                angulo: anguloNorm.toFixed(1)
            });
        }

        // Llenar tabla
        const cuerpoTabla = document.getElementById('cuerpo-tabla');
        puntos.forEach((punto) => {
            const fila = document.createElement('tr');
            fila.dataset.punto = punto.numero;
            fila.innerHTML = `
                <td>${punto.numero}</td>
                <td>${punto.x.toFixed(2)}</td>
                <td>${punto.y.toFixed(2)}</td>
                <td>${punto.angulo}°</td>
            `;
            fila.addEventListener('click', () => seleccionarDesdeTabla(punto.numero));
            cuerpoTabla.appendChild(fila);
        });

        const svgGrafico = document.getElementById('grafico');

        // Crear cuadrícula, ejes y medidas
        const cuadricula = document.getElementById('cuadricula');
        
        // Agregar marcas y números en los ejes
        
        for (let i = -20; i <= 20; i++) {
            if (i !== 0) {
                // Líneas de cuadrícula
                const lineaV = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                lineaV.setAttribute('x1', i);
                lineaV.setAttribute('y1', '-25');
                lineaV.setAttribute('x2', i);
                lineaV.setAttribute('y2', '25');
                if (i % 5 === 0) {
                    lineaV.setAttribute('stroke-width', '0.8');
                    lineaV.setAttribute('stroke', 'var(--border)');
                } else {
                    lineaV.setAttribute('stroke-width', '0.3');
                    lineaV.setAttribute('stroke', 'var(--canvas-grid)');
                }
                cuadricula.appendChild(lineaV);

                const lineaH = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                lineaH.setAttribute('x1', '-25');
                lineaH.setAttribute('y1', i);
                lineaH.setAttribute('x2', '25');
                lineaH.setAttribute('y2', i);
                if (i % 5 === 0) {
                    lineaH.setAttribute('stroke-width', '0.8');
                    lineaH.setAttribute('stroke', 'var(--border)');
                } else {
                    lineaH.setAttribute('stroke-width', '0.3');
                    lineaH.setAttribute('stroke', 'var(--canvas-grid)');
                }
                cuadricula.appendChild(lineaH);

                // Marcas en los ejes (pequeñas líneas)
                if (i % 5 === 0) {
                    // Marca en eje X
                    const marcaX = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    marcaX.setAttribute('x1', i);
                    marcaX.setAttribute('y1', '-0.8');
                    marcaX.setAttribute('x2', i);
                    marcaX.setAttribute('y2', '0.8');
                    marcaX.setAttribute('stroke', 'var(--canvas-axis)');
                    marcaX.setAttribute('stroke-width', '0.6');
                    cuadricula.appendChild(marcaX);

                    // Marca en eje Y
                    const marcaY = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    marcaY.setAttribute('x1', '-0.8');
                    marcaY.setAttribute('y1', i);
                    marcaY.setAttribute('x2', '0.8');
                    marcaY.setAttribute('y2', i);
                    marcaY.setAttribute('stroke', 'var(--canvas-axis)');
                    marcaY.setAttribute('stroke-width', '0.6');
                    cuadricula.appendChild(marcaY);

                    // Números en eje X
                    if (i !== 0) {
                        const textoX = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        textoX.setAttribute('x', i);
                        textoX.setAttribute('y', '3');
                        textoX.setAttribute('class', 'etiqueta-eje');
                        textoX.style.fontSize = '2.3px';
                        textoX.textContent = i;
                        cuadricula.appendChild(textoX);

                        // Números en eje Y
                        const textoY = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        textoY.setAttribute('x', '-2');
                        textoY.setAttribute('y', i + 0.9);
                        textoY.setAttribute('class', 'etiqueta-eje');
                        textoY.style.fontSize = '2.3px';
                        textoY.style.textAnchor = 'end';
                        textoY.textContent = i;
                        cuadricula.appendChild(textoY);
                    }
                }
            }
        }

        // Agregar etiquetas principales de ejes
        const ejesGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        ejesGroup.id = 'ejes-labels';

        const textX = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        textX.setAttribute('x', '27');
        textX.setAttribute('y', '1.5');
        textX.setAttribute('class', 'etiqueta-eje');
        textX.style.fontSize = '3px';
        textX.setAttribute('font-weight', 'bold');
        textX.textContent = 'X';
        ejesGroup.appendChild(textX);

        const textNegX = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        textNegX.setAttribute('x', '-27');
        textNegX.setAttribute('y', '1.5');
        textNegX.setAttribute('class', 'etiqueta-eje');
        textNegX.style.fontSize = '3px';
        textNegX.setAttribute('font-weight', 'bold');
        textNegX.textContent = '-X';
        ejesGroup.appendChild(textNegX);

        const textY = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        textY.setAttribute('x', '1.5');
        textY.setAttribute('y', '-27');
        textY.setAttribute('class', 'etiqueta-eje');
        textY.style.fontSize = '3px';
        textY.setAttribute('font-weight', 'bold');
        textY.textContent = 'Y';
        ejesGroup.appendChild(textY);

        const textNegY = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        textNegY.setAttribute('x', '1.5');
        textNegY.setAttribute('y', '27');
        textNegY.setAttribute('class', 'etiqueta-eje');
        textNegY.style.fontSize = '3px';
        textNegY.setAttribute('font-weight', 'bold');
        textNegY.textContent = '-Y';
        ejesGroup.appendChild(textNegY);

        // Insertar antes del círculo
        const circleRef = document.querySelector('circle');
        svgGrafico.insertBefore(ejesGroup, circleRef);

        // Hacer el círculo más fino
        const circulo = document.querySelector('circle');
        circulo.setAttribute('stroke-width', '0.3');

        // Crear puntos en SVG
        const gruPuntos = document.getElementById('puntos');
        const puntosMap = {}; // Para acceso rápido
        const grupoLabels = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        grupoLabels.id = 'punto-labels';
        svgGrafico.appendChild(grupoLabels);

        puntos.forEach((punto) => {
            const circuloPunto = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circuloPunto.setAttribute('cx', punto.x);
            circuloPunto.setAttribute('cy', -punto.y); // Invertir Y para que coincida con cartesiano
            circuloPunto.setAttribute('r', '0.8');
            circuloPunto.setAttribute('fill', 'var(--point)');
            circuloPunto.setAttribute('class', 'punto');
            circuloPunto.dataset.punto = punto.numero;

            circuloPunto.addEventListener('click', () => seleccionarDesdeGrafico(punto.numero));

            gruPuntos.appendChild(circuloPunto);
            puntosMap[punto.numero] = {
                elemento: circuloPunto,
                datos: punto
            };
        });

        let puntoActualSeleccionado = -1;
        let timerDeseleccion = null;

        function crearEtiquetaPunto(punto) {
            // Limpiar etiquetas anteriores
            while (grupoLabels.firstChild) {
                grupoLabels.removeChild(grupoLabels.firstChild);
            }

            const x = punto.datos.x;
            const y = -punto.datos.y;

            const textoInfo = `P${punto.datos.numero} (${punto.datos.x.toFixed(2)}, ${punto.datos.y.toFixed(2)}) ${punto.datos.angulo}°`;

            // Crear texto primero para poder medir su tamaño real
            const texto = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            texto.setAttribute('x', x);
            texto.setAttribute('y', y - 3);
            texto.setAttribute('class', 'punto-label');
            texto.style.textAnchor = 'middle';
            texto.style.fontSize = '2.3px';
            texto.textContent = textoInfo;
            grupoLabels.appendChild(texto);

            // Evitar que la etiqueta se salga del lienzo cerca de los bordes
            const caja = texto.getBBox();
            const margen = 28;
            let dx = 0;
            if (caja.x < -margen) dx = -margen - caja.x;
            else if (caja.x + caja.width > margen) dx = margen - (caja.x + caja.width);
            if (dx !== 0) {
                texto.setAttribute('x', x + dx);
            }
            const cajaFinal = texto.getBBox();

            // Fondo ajustado al tamaño real del texto
            const relleno = 0.8;
            const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            bg.setAttribute('x', cajaFinal.x - relleno);
            bg.setAttribute('y', cajaFinal.y - relleno * 0.5);
            bg.setAttribute('width', cajaFinal.width + relleno * 2);
            bg.setAttribute('height', cajaFinal.height + relleno);
            bg.setAttribute('class', 'punto-label-bg');
            bg.setAttribute('stroke', 'var(--accent)');
            bg.setAttribute('stroke-width', '0.15');
            grupoLabels.insertBefore(bg, texto);
        }

        function mostrarEtiqueta(numero) {
            if (puntosMap[numero]) {
                crearEtiquetaPunto(puntosMap[numero]);
            }
        }

        function ocultarEtiqueta() {
            while (grupoLabels.firstChild) {
                grupoLabels.removeChild(grupoLabels.firstChild);
            }
        }

        // Seleccionar desde tabla
        function seleccionarDesdeTabla(numero) {
            clearTimeout(timerDeseleccion);
            puntoActualSeleccionado = numero;

            // Actualizar tabla
            document.querySelectorAll('#cuerpo-tabla tr').forEach(fila => {
                fila.classList.remove('activo');
            });
            const filaActiva = document.querySelector(`#cuerpo-tabla tr[data-punto="${numero}"]`);
            if (filaActiva) {
                filaActiva.classList.add('activo');
                filaActiva.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            // Actualizar gráfico
            document.querySelectorAll('.punto').forEach(punto => {
                punto.classList.remove('activo');
            });
            const puntoSVG = puntosMap[numero];
            if (puntoSVG) {
                puntoSVG.elemento.classList.add('activo');
                mostrarEtiqueta(numero);
            }

            // Deseleccionar después de 10 segundos
            timerDeseleccion = setTimeout(() => {
                deseleccionarPunto();
            }, 10000);
        }

        // Seleccionar desde gráfico
        function seleccionarDesdeGrafico(numero) {
            clearTimeout(timerDeseleccion);
            puntoActualSeleccionado = numero;

            // Actualizar tabla
            document.querySelectorAll('#cuerpo-tabla tr').forEach(fila => {
                fila.classList.remove('activo');
            });
            const filaActiva = document.querySelector(`#cuerpo-tabla tr[data-punto="${numero}"]`);
            if (filaActiva) {
                filaActiva.classList.add('activo');
                filaActiva.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            // Actualizar gráfico
            document.querySelectorAll('.punto').forEach(punto => {
                punto.classList.remove('activo');
            });
            const puntoSVG = puntosMap[numero];
            if (puntoSVG) {
                puntoSVG.elemento.classList.add('activo');
                mostrarEtiqueta(numero);
            }

            // Deseleccionar después de 10 segundos
            timerDeseleccion = setTimeout(() => {
                deseleccionarPunto();
            }, 10000);
        }

        // Deseleccionar punto
        function deseleccionarPunto() {
            document.querySelectorAll('#cuerpo-tabla tr').forEach(fila => {
                fila.classList.remove('activo');
            });
            document.querySelectorAll('.punto').forEach(punto => {
                punto.classList.remove('activo');
            });
            ocultarEtiqueta();
            puntoActualSeleccionado = -1;
        }

        // Seleccionar punto 0 por defecto
        seleccionarDesdeTabla(0);
    </script>
</body>
</html>
